<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Puzzle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

    <div class="header">
        <div class="title">
            <h2>Math Puzzle</h2>
            <span id="level">Level 1</span>
        </div>
    </div>

    <div class="modes-container">
        <button id="mode-add-sub" class="mode-btn">➕/➖</button>
        <button id="mode-mul-div" class="mode-btn">✖️/➗</button>
        <button id="mode-random" class="mode-btn active">🔀 مختلط</button>
    </div>

    <div class="card">
        <div id="equation" class="equation">
            </div>
    </div>

    <div id="numbers" class="numbers">
        </div>

    <button id="deleteBtn" class="delete">
        🗑 
    </button>

</div>

<script src="script.js"></script>
</body>
</html>
